{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WIADSPOT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/login.css' %}" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <img src="{% static 'images/logo.png' %}" alt="WIADSPOT Logo" class="login-logo">
            </div>

            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue to your portal</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control login-input" placeholder="Enter your username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control login-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn w-100">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
